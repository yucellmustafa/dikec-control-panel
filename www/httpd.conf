# www/httpd.conf — Dikec Control Panel busybox httpd base config
#
# CGI: busybox httpd (bin-utils 1.36.1) only executes CGI scripts that
# live under the /cgi-bin/ sub-directory of the document root.
# The .cgi extension alone does NOT trigger execution outside cgi-bin/.
# The panel API is therefore served at: /cgi-bin/api.cgi
#
# Auth: Basic-auth lines (A:/path:user:pass) are APPENDED at runtime
# by start-httpd.sh only when /data/dikec/conf/lan_expose == 1.
# In localhost mode (default) no HTTP-layer auth is added; api.cgi
# enforces the panel_token instead.
#
# Default directory index
I:index.html
