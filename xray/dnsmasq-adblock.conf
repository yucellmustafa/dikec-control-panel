# Dikec Control Panel — adblock dnsmasq instance template
# Placeholders (@@VAR@@) are substituted by adblock.sh:_ab_write_conf()
# before writing to @@AB_CONF@@ at runtime.
#
# This second dnsmasq binds ONLY 127.0.0.1:@@AB_PORT@@ — it does NOT touch
# the stock resolver on 192.168.0.1:53.  Hotspot clients reach it via
# iptables PREROUTING REDIRECT (br0 udp/tcp :53 → :@@AB_PORT@@).

# Do not read upstream servers from /etc/resolv.conf
no-resolv

# Blank base config — all settings come from this file
conf-file=/dev/null

# Our exclusive port (stock dnsmasq owns 53; we own @@AB_PORT@@)
port=@@AB_PORT@@

# Bind only loopback — iptables REDIRECT delivers hotspot-client queries here
listen-address=@@AB_LISTEN@@
bind-interfaces

# Sinkhole: return 0.0.0.0 for every domain listed in the hosts file
addn-hosts=@@AB_HOSTS@@

# Forward non-blocked queries to the stock dnsmasq
server=@@AB_UPSTREAM@@

# Our pid file — used to identify and signal our instance (never kill stock!)
pid-file=@@AB_PID@@

# Log to adblock log (suppress noisy per-query lines; keep errors)
log-facility=@@AB_LOG@@
